{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh; position: relative;">
    
    <!-- Background Floating Elements -->
    <div style="position: absolute; top: 20%; right: 15%; width: 250px; height: 250px; background: var(--secondary); border-radius: 50%; filter: blur(90px); opacity: 0.25; z-index: -1;"></div>
    <div style="position: absolute; bottom: 5%; left: 5%; width: 350px; height: 350px; background: var(--primary); border-radius: 50%; filter: blur(120px); opacity: 0.25; z-index: -1;"></div>

    <div class="col-md-8 col-lg-6" data-aos="zoom-in" data-aos-duration="800">

        <div class="card glass-card border-0 p-3 pt-4 pb-4 animate__animated animate__fadeInUp">
            <div class="card-body px-4 px-md-5">

                <div class="text-center mb-5">
                    <i class="fa fa-id-card-o fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
                    <h2 class="fw-bold mb-2 font-weight-bold text-dark" style="letter-spacing: 1px;">Create an Account</h2>
                    <p class="text-muted">Join BlogNova today to start sharing your thoughts.</p>
                </div>

                <form action="{% url 'register' %}" method="POST" class="mt-4">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        {{ form|crispy }}
                    </div>

                    <div class="d-grid mt-4 pt-2">
                        <button type="submit" class="btn btn-primary btn-block btn-lg shadow-sm" style="border-radius: 10px; font-weight: 600; letter-spacing: 0.5px;">
                            <i class="fa fa-user-plus mr-2"></i> Register Account
                        </button>
                    </div>

                </form>

                <div class="text-center mt-5">
                    <p class="mb-0 text-muted" style="font-size: 0.95rem;">
                        Already have an account?
                        <a href="{% url 'login' %}" class="font-weight-bold" style="color: var(--primary); text-decoration: none; border-bottom: 2px solid transparent; transition: border-color 0.3s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='transparent'">
                            Login here
                        </a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>

<style>
/* Adjust crispy forms generic styling to match our premium aesthetic */
.asteriskField {
    color: var(--secondary);
}
.form-group label {
    font-weight: 600;
    color: #475569;
    font-size: 0.9rem;
    margin-bottom: 8px;
}
.help-block {
    font-size: 0.8rem;
    color: #64748b;
    margin-top: 5px;
}
</style>

{% endblock %}
