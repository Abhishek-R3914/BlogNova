{% extends 'base.html' %}
{% block content %}
<h3 class="text-uppercase text-primary" style="letter-spacing: 2px;">SEARCH TERM -{{keyword}}</h3>

  <div class="row mb-2">
    {%if blogs%}
    {%for i in blogs%}
    <div class="col-md-6">
      <div class="card border-0" >
        <div class="card-body">
          <h3><a href="{% url 'blogs' i.slug %}" class="text-dark">{{i.title}}</a></h3>
          <small class="mb-1 text-muted">{{i.created_at|date:"M d, Y"}}</small>
          <p class="card-text">{{i.short_description | truncatewords:20 }}</p>
        </div>
      </div>
    </div>
    {%endfor%}
    {%else%}
    <div class="col-md-12">
      <p class="text-center">No posts available in this category.</p>
    </div>
    {%endif%}
  </div>
</div>
{% endblock %}
