{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4" style="max-width: 1200px;">
    <div class="row">
       {% include 'dashboard/sidebar.html' %}
       
        <!-- Rightside Content -->
         <div class="col-md-9" data-aos="fade-left" data-aos-delay="100">
            <h2 class="font-weight-bold mb-4" style="color: #1e293b;">Dashboard Overview</h2>
            
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card glass-card border-0 h-100 p-2" style="background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%); transition: transform 0.3s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body d-flex align-items-center">
                            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center shadow" style="width: 70px; height: 70px;">
                                <i class="fa fa-tags fa-2x"></i>
                            </div>
                            <div class="ml-4">
                                <h6 class="text-uppercase text-muted font-weight-bold mb-1" style="letter-spacing: 1px;">Total Categories</h6>
                                <h2 class="mb-0 font-weight-bold" style="color: var(--primary); font-size: 2.5rem;">{{category_count}}</h2>
                            </div>
                        </div>
                    </div>
                </div>
                
                 <div class="col-md-6 mb-4">
                    <div class="card glass-card border-0 h-100 p-2" style="background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%); transition: transform 0.3s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body d-flex align-items-center">
                            <div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center shadow" style="width: 70px; height: 70px;">
                                <i class="fa fa-file-text-o fa-2x"></i>
                            </div>
                            <div class="ml-4">
                                <h6 class="text-uppercase text-muted font-weight-bold mb-1" style="letter-spacing: 1px;">Total Posts</h6>
                                <h2 class="mb-0 font-weight-bold text-success" style="font-size: 2.5rem;">{{blogs_count}}</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Quick Actions Area -->
            <div class="glass-card p-4 mt-2">
                <h4 class="font-weight-bold mb-4 pb-2 border-bottom">Quick Actions</h4>
                <div class="d-flex flex-wrap gap-3" style="gap: 15px;">
                    <a href="{% url 'add_category' %}" class="btn btn-primary shadow-sm"><i class="fa fa-plus mr-2"></i>New Category</a>
                    <a href="{% url 'add_posts' %}" class="btn btn-success shadow-sm"><i class="fa fa-edit mr-2"></i>Write Post</a>
                </div>
            </div>
            
         </div>
    </div>
</div>

{% endblock %}
