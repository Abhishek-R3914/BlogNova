{% extends 'base.html' %}
{% block content %}
{%load crispy_forms_tags%}

<div class="row">
    {% include 'dashboard/sidebar.html' %}
    <div class="col-md-9">
        <h3>Edit Posts</h3>
        <form action="{% url 'edit_posts' post.pk %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>

{% endblock %}
