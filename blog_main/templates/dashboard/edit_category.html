{% extends 'base.html' %}
{% block content %}
{%load crispy_forms_tags%}

<div class="row">
    {% include 'dashboard/sidebar.html' %}
    <div class="col-md-9" data-aos="fade-left" data-aos-delay="100">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="font-weight-bold mb-0 text-dark">Edit Category</h3>
            <a href="{% url 'categories' %}" class="btn btn-outline-secondary shadow-sm rounded-pill px-4"><i class="fa fa-arrow-left mr-2"></i>Back to Categories</a>
        </div>
        
        <div class="card glass-card border-0 animate__animated animate__zoomIn bg-white shadow-sm" style="max-width: 600px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fa fa-edit fa-3x mb-3" style="color: var(--primary);"></i>
                    <h4 class="font-weight-bold">Update Category</h4>
                    <p class="text-muted">Modify the details of the category below.</p>
                </div>
                
                <form action="{% url 'edit_category' category.id %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        {{ form|crispy }}
                    </div>
                    
                    <div class="d-flex gap-3 justify-content-end mt-4 pt-3 border-top">
                        <a href="{% url 'categories' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5 shadow-sm ml-2"><i class="fa fa-save mr-2"></i>Update Category</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>

<style>
/* Adjust crispy forms for dashboard */
.asteriskField { color: var(--secondary); }
.form-group label { font-weight: 600; color: #475569; margin-bottom: 8px; }
.form-control { border-radius: 8px; border-color: #cbd5e1; }
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
</style>
{% endblock %}
