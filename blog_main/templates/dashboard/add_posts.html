{% extends 'base.html' %}
{% block content %}
{%load crispy_forms_tags%}

<div class="row">
    {% include 'dashboard/sidebar.html' %}
    <div class="col-md-9" data-aos="fade-left" data-aos-delay="100">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="font-weight-bold mb-0 text-dark">Add New Post</h3>
            <a href="{% url 'posts' %}" class="btn btn-outline-secondary shadow-sm rounded-pill px-4"><i class="fa fa-arrow-left mr-2"></i>Back to Posts</a>
        </div>
        
        <div class="card glass-card border-0 animate__animated animate__fadeInUp bg-white shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <i class="fa fa-pencil-square-o fa-3x mb-3" style="color: var(--primary);"></i>
                    <h4 class="font-weight-bold">Write an Article</h4>
                    <p class="text-muted">Create a new blog post and share your thoughts with the world.</p>
                </div>
                
                <form action="{% url 'add_posts' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        {{ form|crispy }}
                    </div>
                    
                    <div class="d-flex gap-3 justify-content-end mt-5 pt-4 border-top">
                        <a href="{% url 'posts' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5 shadow-sm ml-2"><i class="fa fa-paper-plane mr-2"></i>Publish Post</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>

<style>
/* Adjust crispy forms for dashboard */
.asteriskField { color: var(--secondary); }
.form-group label { font-weight: 600; color: #475569; margin-bottom: 8px; }
.form-control, .django-ckeditor-widget { border-radius: 8px !important; border-color: #cbd5e1 !important; }
.form-control:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1) !important; }
</style>
{% endblock %}
